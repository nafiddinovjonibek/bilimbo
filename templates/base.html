<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bilimbo{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #57c9f5;
            --sky-bottom: #aee9ff;
            --sun: #ffd93d;
            --coral: #ff6b6b;
            --orange: #ff9f43;
            --yellow: #ffce3d;
            --green: #5fd068;
            --purple: #a06cf0;
            --ink: #35407d;
            --cloud: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Baloo 2', 'Comic Sans MS', 'Segoe UI', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 70%, #d8f7c8 100%);
            overflow-x: hidden;
            position: relative;
        }

        /* ===== Osmon dekoratsiyasi ===== */
        .sun {
            position: fixed;
            top: 70px; right: 40px;
            width: 90px; height: 90px;
            background: radial-gradient(circle, #fff3b0 20%, var(--sun) 60%);
            border-radius: 50%;
            box-shadow: 0 0 60px 25px rgba(255, 217, 61, .55);
            animation: sun-glow 4s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes sun-glow {
            0%, 100% { box-shadow: 0 0 60px 25px rgba(255, 217, 61, .55); }
            50%      { box-shadow: 0 0 80px 35px rgba(255, 217, 61, .8); }
        }
        .cloud {
            position: fixed;
            background: var(--cloud);
            border-radius: 999px;
            opacity: .9;
            z-index: 0;
            animation: drift linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: var(--cloud);
            border-radius: 50%;
        }
        .cloud-1 { width: 120px; height: 40px; top: 120px; left: -140px; animation-duration: 55s; }
        .cloud-1::before { width: 50px; height: 50px; top: -22px; left: 20px; }
        .cloud-1::after  { width: 38px; height: 38px; top: -16px; left: 62px; }
        .cloud-2 { width: 90px; height: 32px; top: 240px; left: -110px; animation-duration: 75s; animation-delay: -30s; }
        .cloud-2::before { width: 40px; height: 40px; top: -18px; left: 14px; }
        .cloud-2::after  { width: 30px; height: 30px; top: -12px; left: 48px; }
        .cloud-3 { width: 140px; height: 45px; top: 60px; left: -160px; animation-duration: 90s; animation-delay: -60s; }
        .cloud-3::before { width: 55px; height: 55px; top: -25px; left: 25px; }
        .cloud-3::after  { width: 42px; height: 42px; top: -18px; left: 72px; }
        @keyframes drift {
            from { transform: translateX(0); }
            to   { transform: translateX(calc(100vw + 320px)); }
        }

        /* Pastdagi tepaliklar */
        .hills {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 140px;
            z-index: 0;
            pointer-events: none;
        }
        .hills svg { width: 100%; height: 100%; display: block; }

        /* ===== Navbar ===== */
        .navbar {
            position: relative;
            z-index: 5;
            margin: 16px auto 0;
            max-width: 1060px;
            width: calc(100% - 32px);
            background: rgba(255, 255, 255, .92);
            border-radius: 999px;
            padding: 10px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 0 rgba(53, 64, 125, .15);
        }
        .brand {
            font-size: 26px;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .brand span:nth-child(1) { color: var(--coral); }
        .brand span:nth-child(2) { color: var(--orange); }
        .brand span:nth-child(3) { color: #e6b422; }
        .brand span:nth-child(4) { color: var(--green); }
        .brand span:nth-child(5) { color: #38b6e3; }
        .brand span:nth-child(6) { color: var(--purple); }
        .brand span:nth-child(7) { color: var(--coral); }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .user-info { font-weight: 700; font-size: 15px; }
        .logout-icon { display: none; }
        .badge {
            padding: 3px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            background: var(--yellow);
            color: #7a5c00;
        }

        /* ===== Tugmalar ===== */
        .btn {
            display: inline-block;
            padding: 10px 22px;
            border: none;
            border-radius: 999px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            background: var(--coral);
            box-shadow: 0 5px 0 #d94f4f;
            transition: transform .12s, box-shadow .12s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #d94f4f; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #d94f4f; }
        .btn-green { background: var(--green); box-shadow: 0 5px 0 #3fae4a; }
        .btn-green:hover { box-shadow: 0 7px 0 #3fae4a; }
        .btn-green:active { box-shadow: 0 2px 0 #3fae4a; }
        .btn-outline {
            background: #fff;
            color: var(--ink);
            box-shadow: 0 5px 0 rgba(53, 64, 125, .25);
        }
        .btn-outline:hover { box-shadow: 0 7px 0 rgba(53, 64, 125, .25); }
        .btn-outline:active { box-shadow: 0 2px 0 rgba(53, 64, 125, .25); }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1060px;
            margin: 0 auto;
            padding: 24px 16px 170px;
        }

        /* ===== Auth kartochkasi ===== */
        .auth-card {
            position: relative;
            z-index: 2;
            max-width: 440px;
            margin: 40px auto 160px;
            background: #fff;
            border-radius: 28px;
            padding: 32px 30px;
            box-shadow: 0 10px 0 rgba(53, 64, 125, .18);
        }
        .auth-card h1 { font-size: 26px; margin-bottom: 6px; text-align: center; }
        .auth-emoji { text-align: center; font-size: 44px; margin-bottom: 4px; }
        .auth-sub { text-align: center; font-size: 15px; color: #6c76ad; margin-bottom: 20px; }
        .field { margin-bottom: 14px; }
        .field > label { display: block; font-size: 15px; font-weight: 700; margin-bottom: 5px; }
        .input {
            width: 100%;
            padding: 11px 16px;
            border: 3px solid #dbe4ff;
            border-radius: 16px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            color: var(--ink);
            transition: border-color .15s;
        }
        .input:focus { outline: none; border-color: var(--sky-top); }
        .role-choices { display: flex; gap: 10px; }
        .role-choices label {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 12px 8px;
            border: 3px solid #dbe4ff;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            transition: transform .12s, border-color .12s, background .12s;
        }
        .role-choices label:hover { transform: scale(1.04); }
        .role-choices label:has(input:checked) {
            border-color: var(--green);
            background: #eaffe9;
        }
        .role-choices input { position: absolute; opacity: 0; }
        .role-emoji { font-size: 34px; line-height: 1; }
        .errors { color: #e23c3c; font-size: 13px; font-weight: 600; margin-top: 4px; }
        .form-errors {
            background: #ffecec;
            border: 3px solid #ffc9c9;
            color: #e23c3c;
            border-radius: 16px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .auth-card .btn { width: 100%; padding: 13px; font-size: 18px; margin-top: 6px; }
        .auth-switch { text-align: center; margin-top: 18px; font-size: 15px; font-weight: 600; color: #6c76ad; }
        .auth-switch a { color: var(--coral); font-weight: 800; text-decoration: none; }

        /* ===== O'yin pufakchalari (bosh sahifa va bo'lim sahifalari) ===== */
        .island {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--ink);
            animation: pop-in .5s cubic-bezier(.34, 1.56, .64, 1) backwards;
        }
        .island:nth-child(1) { animation-delay: .05s; }
        .island:nth-child(2) { animation-delay: .18s; }
        .island:nth-child(3) { animation-delay: .31s; }
        .island:nth-child(4) { animation-delay: .44s; }
        .island:nth-child(5) { animation-delay: .57s; }
        @keyframes pop-in {
            from { opacity: 0; scale: .2; }
            to   { opacity: 1; scale: 1; }
        }
        .bubble {
            position: relative;
            width: clamp(110px, 13vw, 150px);
            height: clamp(110px, 13vw, 150px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(44px, 6vw, 62px);
            border: 6px solid #fff;
            transition: transform .18s cubic-bezier(.34, 1.56, .64, 1);
            animation: bob 3.2s ease-in-out infinite;
        }
        .island:nth-child(2) .bubble { animation-delay: -.7s; }
        .island:nth-child(3) .bubble { animation-delay: -1.4s; }
        .island:nth-child(4) .bubble { animation-delay: -2.1s; }
        .island:nth-child(5) .bubble { animation-delay: -2.8s; }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-9px); }
        }
        .island:hover .bubble { transform: scale(1.12) rotate(-4deg); }
        .island:active .bubble { transform: scale(.95); }
        .bubble-c1 { background: var(--coral);  box-shadow: 0 8px 0 #d94f4f; }
        .bubble-c2 { background: var(--orange); box-shadow: 0 8px 0 #e0802a; }
        .bubble-c3 { background: var(--yellow); box-shadow: 0 8px 0 #dfae23; }
        .bubble-c4 { background: var(--green);  box-shadow: 0 8px 0 #3fae4a; }
        .bubble-c5 { background: var(--purple); box-shadow: 0 8px 0 #8250cf; }
        .bubble .num {
            position: absolute;
            top: -6px; left: -6px;
            width: 38px; height: 38px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: var(--ink);
            box-shadow: 0 3px 0 rgba(53, 64, 125, .2);
        }
        .island-name {
            background: #fff;
            padding: 6px 18px;
            border-radius: 999px;
            font-size: clamp(15px, 1.8vw, 18px);
            font-weight: 800;
            box-shadow: 0 4px 0 rgba(53, 64, 125, .15);
            white-space: nowrap;
        }
        .page-title {
            text-align: center;
            margin: 28px 0 10px;
        }
        .page-title h1 {
            font-size: clamp(26px, 4.5vw, 42px);
            font-weight: 800;
            text-shadow: 0 3px 0 rgba(255, 255, 255, .6);
        }
        .page-title p {
            font-size: clamp(16px, 2.5vw, 21px);
            font-weight: 700;
            color: #4a55a0;
            margin-top: 4px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
        /* ===== Mobil moslashuv ===== */
        @media (max-width: 640px) {
            .sun { width: 56px; height: 56px; top: 84px; right: 14px; box-shadow: 0 0 40px 15px rgba(255, 217, 61, .5); }
            .brand { font-size: 21px; }
            .navbar {
                padding: 7px 8px 7px 16px;
                margin-top: 10px;
                width: calc(100% - 20px);
                gap: 8px;
            }
            .navbar .badge { display: none; }
            .nav-right { gap: 8px; flex-shrink: 0; }
            .user-info {
                font-size: 14px;
                max-width: 32vw;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .navbar .btn { padding: 7px 13px; font-size: 13px; box-shadow: 0 4px 0 rgba(53, 64, 125, .25); }
            .navbar .btn-green { box-shadow: 0 4px 0 #3fae4a; }
            /* Chiqish — dumaloq emoji tugma */
            .btn-logout {
                width: 42px;
                height: 42px;
                padding: 0 !important;
                border-radius: 50%;
                font-size: 19px !important;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .logout-text { display: none; }
            .logout-icon { display: inline; }
            .hills { height: 80px; }
            .container { padding: 16px 12px 110px; }
            .auth-card {
                margin: 20px 14px 120px;
                padding: 24px 20px;
                border-radius: 22px;
            }
            .auth-card h1 { font-size: 22px; }
            .input { padding: 12px 14px; font-size: 16px; }
            .bubble {
                width: 104px;
                height: 104px;
                font-size: 42px;
                border-width: 5px;
            }
            .bubble .num { width: 32px; height: 32px; font-size: 17px; }
            .island-name { font-size: 15px; padding: 5px 15px; }
            .page-title { margin-top: 18px; }
        }
        @media (max-width: 400px) {
            .brand { font-size: 19px; letter-spacing: 0; }
            .user-info { max-width: 26vw; }
            .navbar .btn { padding: 6px 10px; font-size: 12px; }
            .btn-logout { width: 40px; height: 40px; }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <div class="sun"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="hills">
        <svg viewBox="0 0 1440 140" preserveAspectRatio="none">
            <path d="M0,90 Q240,10 480,80 T960,70 T1440,90 L1440,140 L0,140 Z" fill="#7ed957"/>
            <path d="M0,120 Q360,60 720,110 T1440,105 L1440,140 L0,140 Z" fill="#5fd068"/>
        </svg>
    </div>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="brand"><span>B</span><span>i</span><span>l</span><span>i</span><span>m</span><span>b</span><span>o</span></a>
        <div class="nav-right">
            {% if user.is_authenticated %}
                <span class="user-info">{{ user.get_full_name|default:user.username }}</span>
                <span class="badge">{{ user.get_role_display }}</span>
                <form action="{% url 'logout' %}" method="post" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline btn-logout">
                        <span class="logout-text">Chiqish</span><span class="logout-icon">🚪</span>
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline">Kirish</a>
                <a href="{% url 'register' %}" class="btn btn-green">Ro'yxatdan o'tish</a>
            {% endif %}
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
